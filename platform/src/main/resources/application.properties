# ============================================================================
# Platform modulith — merged config for individual + idgen + localization.
# Infra (datasource/redis/kafka) points at local docker-compose.
# Downstream HTTP services (user/boundary/mdms/enc) point at localhost ports
# that are kubectl port-forwarded from the cluster (see run notes).
# ============================================================================

server.port=8080
app.timezone=UTC
spring.main.allow-bean-definition-overriding=true

# ---------- DATASOURCE (single, shared by all modules) ----------
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5433/platform
spring.datasource.username=postgres
spring.datasource.password=postgres

# ---------- FLYWAY (each module owns a folder; one history table) ----------
spring.flyway.enabled=true
spring.flyway.url=jdbc:postgresql://localhost:5433/platform
spring.flyway.user=postgres
spring.flyway.password=postgres
spring.flyway.table=platform_schema_version
spring.flyway.baseline-on-migrate=true
spring.flyway.outOfOrder=true
spring.flyway.locations=classpath:/db/migration/idgen,classpath:/db/migration/localization,classpath:/db/migration/individual

# ---------- JPA (localization uses Spring Data JPA) ----------
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database=postgresql
spring.jpa.show-sql=false

# ---------- REDIS (both spring.redis.* read by localization code, and
#            spring.data.redis.* read by Boot autoconfig for cache) ----------
spring.redis.host=localhost
spring.redis.port=6379
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.type=redis
spring.cache.redis.time-to-live=60
spring.cache.autoexpiry=true

# ---------- KAFKA ----------
kafka.config.bootstrap_server_config=localhost:9092
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.value-deserializer=org.egov.tracer.kafka.deserializer.HashMapDeserializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.group-id=platform
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.listener.missing-topics-fatal=false
spring.kafka.consumer.properties.spring.json.use.type.headers=false
kafka.consumer.config.auto_commit=true
kafka.consumer.config.auto_commit_interval=100
kafka.consumer.config.session_timeout=15000
kafka.consumer.config.auto_offset_reset=earliest
kafka.producer.config.retries_config=0
kafka.producer.config.batch_size_config=16384
kafka.producer.config.linger_ms_config=1
kafka.producer.config.buffer_memory_config=33554432

# ============================================================================
# idgen module
# ============================================================================
invalid.input=Invalid input
id.generation.table=id_generator
id.sequence.overflow=IDSeqOverFlow
id.sequence.notfound=IDSeqNotFound
id.invalid.format=InvalidIDFormat
success=SUCCESSFULL
failed=FAILED
city.code.notfound=CityCodeNotFound
# from.mdms=false + autocreate so in-process idgen works without MDMS in the test
idformat.from.mdms=false
autocreate.new.seq=true
autocreate.request.seq=true
id.timezone=IST
mdms.service.host=http://localhost:8283/
mdms.service.search.uri=egov-mdms-service/v1/_search

# ============================================================================
# individual module
# ============================================================================
# IDGEN (legacy HTTP config — now unused for the converted edge, kept for other paths)
egov.idgen.host=http://localhost:8088/
egov.idgen.path=egov-idgen/id/_generate
egov.idgen.integration.enabled=true
idgen.individual.id.format=individual.id

egov.beneficiary.idgen.host=http://localhost:8088/
egov.beneficiary.idgen.idpool.search.path=beneficiary-idgen/id/id_pool/_search
egov.beneficiary.idgen.idpool.update.path=beneficiary-idgen/id/id_pool/_update
egov.beneficiary.idgen.integration.enabled=false
individual.beneficiary.id.validation.enabled=false
individual.beneficiary.id.length=12

# enc-client / mdms
egov.mdms.host=http://localhost:8283
egov.mdms.search.endpoint=/egov-mdms-service/v1/_search
# enc-client loads the DataSecurity/SecurityPolicy master for this tenant at boot;
# 'dev' has a populated policy in this cluster ('default' is empty -> NPE).
state.level.tenant.id=dev
egov.enc.host=http://localhost:8284
egov.enc.encrypt.endpoint=/egov-enc-service/crypto/v1/_encrypt
egov.enc.decrypt.endpoint=/egov-enc-service/crypto/v1/_decrypt

# topics
individual.consumer.bulk.create.topic=individual-consumer-bulk-create-topic
individual.consumer.bulk.update.topic=individual-consumer-bulk-update-topic
individual.consumer.bulk.delete.topic=individual-consumer-bulk-delete-topic
individual.producer.save.topic=save-individual-topic
individual.producer.update.topic=update-individual-topic
individual.producer.delete.topic=delete-individual-topic
individual.producer.update.user.id.topic=update-user-id-topic

aadhaar.pattern=\\d{12}
mobile.pattern=\\d+

# user service integration
egov.user.host=http://localhost:8281
egov.create.user.url=/user/users/_createnovalidate
egov.search.user.url=/user/_search
egov.update.user.url=/user/users/_updatenovalidate
egov.user.integration.enabled=true
user.sync.enabled=true
user.service.user.type=CITIZEN
user.service.account.locked=false

# notification
notification.sms.enabled=true
kafka.topics.notification.sms=egov.core.notification.sms
notification.sms.disabled.roles=ORG_ADMIN

# localization (consumer-side config — now unused for converted edge)
egov.localization.host=http://localhost:8087/
egov.localization.context.path=localization/messages/v1
egov.localization.search.endpoint=/_search
egov.localization.statelevel=true

# boundary
egov.boundary.host=http://localhost:8282
egov.boundary.search.url=/boundary-service/boundary/_search
egov.boundary.hierarchy=HCM-Moz-Hierarchy

# central instance multitenancy
state.level.tenantid.length=1
state.schema.index.position.tenantid=0
is.environment.central.instance=false

# ---------- tracing off for local ----------
otel.traces.exporter=none
otel.logs.exporter=none
otel.metrics.exporter=none
management.endpoints.web.base-path=/
